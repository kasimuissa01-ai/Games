  <body>
    <div id="root">
      <!-- Instant HTML/CSS Native Loading Splash Screen for Offline/Slow Network access -->
      <style>
        .splash-wrapper {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background-color: #020617;
          color: #ffffff;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
          z-index: 99999;
          user-select: none;
        }
        .splash-logo-container {
          position: relative;
          width: 110px;
          height: 110px;
          margin-bottom: 24px;
        }
        .splash-logo-img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          border-radius: 50%;
          border: 3px solid rgba(59, 130, 246, 0.4);
          box-shadow: 0 0 25px rgba(59, 130, 246, 0.3);
          animation: splashPulse 2.2s infinite ease-in-out;
        }
        .splash-ring {
          position: absolute;
          inset: -8px;
          border-radius: 50%;
          border: 2px solid transparent;
          border-top-color: #3b82f6;
          border-bottom-color: #f43f5e;
          animation: splashSpin 2.5s linear infinite;
        }
        .splash-title {
          font-size: 20px;
          font-weight: 900;
          letter-spacing: 0.35em;
          text-transform: uppercase;
          color: #ffffff;
          margin-bottom: 8px;
          text-align: center;
          animation: splashFadeIn 0.8s ease-out;
        }
        .splash-subtitle {
          font-size: 10px;
          font-weight: 700;
          letter-spacing: 0.25em;
          color: #64748b;
          text-transform: uppercase;
          text-align: center;
          margin-bottom: 30px;
          animation: splashFadeIn 1s ease-out;
        }
        .splash-indicator {
          width: 130px;
          height: 3px;
          background-color: rgba(255, 255, 255, 0.08);
          border-radius: 999px;
          overflow: hidden;
        }
        .splash-progress {
          width: 0%;
          height: 100%;
          background: linear-gradient(90deg, #3b82f6, #f43f5e);
          border-radius: 999px;
          animation: progressRun 2s ease-in-out infinite;
        }
        @keyframes splashPulse {
          0%, 100% { transform: scale(1); filter: brightness(1); }
          50% { transform: scale(1.05); filter: brightness(1.1); }
        }
        @keyframes splashSpin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        @keyframes splashFadeIn {
          0% { opacity: 0; transform: translateY(6px); }
          100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes progressRun {
          0% { width: 0%; margin-left: 0%; }
          50% { width: 60%; margin-left: 20%; }
          100% { width: 100%; margin-left: 100%; }
        }
      </style>
      <div class="splash-wrapper">
        <div class="splash-logo-container">
          <div class="splash-ring"></div>
          <img class="splash-logo-img" src="https://i.postimg.cc/mgH2J9Ly/1ced088596254ce6778c7ffe66534f37.jpg" alt="GAMES HOME Logo" />
        </div>
        <div class="splash-title">GAMES HOME</div>
        <div class="splash-subtitle">Premium Games Home</div>
        <div class="splash-indicator">
          <div class="splash-progress"></div>
        </div>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
